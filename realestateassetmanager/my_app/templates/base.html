{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Estate Asset Manager</title>
    <!-- Link to your CSS file -->
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>

    <!-- Main Navigation Bar -->
    <nav class="main-nav">
        <div class="nav-container">
            <div class="nav-brand">
                <a href="{% url 'building-list' %}">Real Estate Asset Manager</a>
            </div>
            
            <div class="nav-links">
                <a href="{% url 'building-list' %}" class="nav-item">Portfolio</a>
                
                {% if user.is_authenticated %}
                    <span class="user-greeting">Welcome, <strong>{{ user.username }}</strong></span>
                    <form action="{% url 'logout' %}" method="post" class="logout-form">
                        {% csrf_token %}
                        <button type="submit" class="btn-logout">Logout</button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}" class="nav-item">Login</a>
                    <a href="{% url 'signup' %}" class="nav-item">Sign Up</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <!-- Main Content Container -->
    <!-- This class 'page-wrapper' handles the centering for all pages -->
    <main class="page-wrapper">
        {% block content %}
        {% endblock %}
    </main>

</body>
</html>
