{% load static %}
<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>
    <nav class="main-nav">
        <div class="nav-container">
            <a href="{% url 'building-list' %}" class="brand">Real Estate Asset Manager</a>
            <div class="nav-links">
                {% if user.is_authenticated %}
                    <span>{{ user.username }}</span>
                    <form action="{% url 'logout' %}" method="post">{% csrf_token %}<button type="submit">Logout</button></form>
                {% else %}
                    <a href="{% url 'login' %}">Login</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <main class="page-wrapper">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
