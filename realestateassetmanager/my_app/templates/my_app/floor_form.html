{% extends 'base.html' %}

{% block content %}
<div class="auth-card">
    <h2>Manage Floor</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="actions">
            <button type="submit" class="btn-primary">Save Details</button>
            <a href="{% url 'building-list' %}">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
